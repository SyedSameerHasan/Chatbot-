<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowerBouquet Assistant</title>

  <!-- n8n Chat CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7f8;
      color: #222;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background:
        radial-gradient(circle at top left, rgba(255, 120, 150, 0.20), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 210, 220, 0.75), transparent 35%),
        #fff7f8;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 24px;
      padding: 42px 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffe2e8;
      color: #c2184b;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.05;
      color: #171717;
    }

    p {
      margin: 0 auto 24px;
      max-width: 600px;
      color: #555;
      font-size: 18px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #e91e63;
      color: white;
    }

    .button.secondary {
      background: #fff;
      color: #e91e63;
      border: 2px solid #e91e63;
    }

    .note {
      margin-top: 22px;
      font-size: 14px;
      color: #777;
    }

    :root {
      --chat--color-primary: #e91e63;
      --chat--color-primary-shade-50: #d81b60;
      --chat--color-primary-shade-100: #c2185b;
      --chat--color-secondary: #f06292;
      --chat--window--width: 390px;
      --chat--window--height: 620px;
      --chat--border-radius: 18px;
      --chat--message--bot--background: #fff1f5;
      --chat--message--bot--color: #222;
      --chat--message--user--background: #e91e63;
      --chat--message--user--color: #fff;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="card">
      <div class="badge">AI Product Assistant</div>
      <h1>Find the perfect flower, cake, or chocolate gift</h1>
      <p>
        Ask our assistant for birthday gifts, anniversary flowers, chocolate options,
        cakes, bouquets, prices, and product links.
      </p>

      <div class="buttons">
        <button class="button" onclick="window.dispatchEvent(new Event('open-n8n-chat'))">
          Chat with Assistant
        </button>
        <button class="button secondary" onclick="alert('Try asking: Suggest me a chocolate gift for birthday')">
          Example Question
        </button>
      </div>

      <div class="note">
        Chat bubble is available at the bottom-right corner.
      </div>
    </div>
  </section>

  <!-- n8n Chat Script -->
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://n8n.srv1536675.hstgr.cloud/webhook/9e43558a-20d7-4c2d-a046-6f7b913a19bc/chat',
      mode: 'window',
      defaultLanguage: 'en',
      showWelcomeScreen: false,
      initialMessages: [
        'Hi there! 👋 I am FlowerBouquet Assistant. I can help you find flowers, cakes, chocolates, and gift suggestions.'
      ],
      i18n: {
        en: {
          title: 'FlowerBouquet Assistant',
          subtitle: 'Ask me for product suggestions',
          inputPlaceholder: 'Type your question...'
        }
      }
    });
  </script>
</body>
</html>
